<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Nearest Neighbors (KNN) Visualization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Add PrismJS for syntax highlighting in the code step -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <style>
        /* Smooth transitions for text content */
        .fade-transition {
            transition: opacity 0.3s ease-in-out;
        }

        /* MathJax Custom Styling overrides to fit the UI */
        .MathJax {
            font-size: 1.1em !important;
            color: #1e293b !important;
        }

        /* Adjustments for the code block step to utilize space better */
        pre[class*="language-"] {
            margin: 0 !important;
            border-radius: 0.5rem;
            font-size: 0.85rem;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen font-sans text-slate-800 flex items-center justify-center p-4">

    <div class="max-w-6xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">

        <!-- Header -->
        <div class="bg-slate-800 text-white p-6 text-center">
            <h1 class="text-3xl font-bold tracking-wide">K-Nearest Neighbors (KNN)</h1>
            <p class="text-slate-300 mt-2">An interactive step-by-step guide to distance metrics and classification</p>
        </div>

        <div class="p-6 md:p-8 flex flex-col lg:flex-row gap-8 items-start">

            <!-- Canvas Container (Left Side) -->
            <div id="visualContainer"
                class="w-full lg:w-1/2 bg-slate-50 rounded-xl border-2 border-slate-100 p-2 shadow-inner sticky top-6 transition-all duration-300">
                <canvas id="knnCanvas" width="500" height="400"
                    class="w-full h-auto rounded-lg cursor-crosshair bg-white"></canvas>
                <div class="text-center mt-2 text-xs text-slate-500 font-medium">
                    Axes: X = Math Score, Y = Science Score
                </div>
            </div>

            <!-- Content & Controls Container (Right Side) -->
            <div id="textContainer"
                class="w-full lg:w-1/2 flex flex-col min-h-[450px] justify-between transition-all duration-300">

                <div>
                    <!-- Step Progress Indicator -->
                    <div class="flex items-center gap-2 mb-6 text-sm font-semibold text-slate-400">
                        <span id="stepCounter" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full">Step
                            1</span>
                    </div>

                    <!-- Dynamic Content Area -->
                    <div id="contentArea" class="fade-transition">
                        <h2 id="stepTitle" class="text-2xl font-bold text-slate-800 mb-4">Title</h2>
                        <div id="stepDescription" class="text-md text-slate-600 leading-relaxed space-y-3">
                            Description goes here.
                        </div>

                        <!-- Equation Block (Hidden by default, injected dynamically) -->
                        <div id="equationBlock"
                            class="hidden mt-6 bg-blue-50/50 border border-blue-200 p-5 rounded-xl shadow-sm">
                            <!-- Math content will be injected here -->
                        </div>

                        <!-- Code Tutorial Block (Hidden by default) -->
                        <div id="codeBlock" class="hidden mt-4">
                            <!-- Code content injected here -->
                        </div>
                    </div>
                </div>

                <!-- Navigation Buttons -->
                <div class="flex gap-4 mt-8 border-t border-slate-100 pt-6">
                    <button id="btnPrev"
                        class="flex-1 bg-white border-2 border-slate-200 text-slate-600 font-semibold py-3 px-6 rounded-xl hover:bg-slate-50 hover:text-slate-800 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
                                clip-rule="evenodd" />
                        </svg>
                        Back
                    </button>
                    <button id="btnNext"
                        class="flex-1 bg-indigo-600 text-white font-semibold py-3 px-6 rounded-xl hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-200 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                        Next Step
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"
                                clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/knn.js"></script>
</body>

</html>
