<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Tree Visualization & Math Concepts</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- MathJax for rendering LaTeX formulas -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            startup: {
                typeset: false // We will manually trigger typesetting when steps change
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* Smooth transitions for the step content */
        .fade-enter {
            opacity: 0;
            transform: translateY(10px);
        }

        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }

        /* Custom scrollbar for mathematical content areas */
        .math-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .math-scroll::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 font-sans text-gray-800">

    <!-- Main Container -->
    <div
        class="bg-white max-w-5xl w-full rounded-2xl shadow-xl border border-gray-100 overflow-hidden flex flex-col h-[850px]">

        <!-- Header -->
        <header class="bg-blue-600 text-white p-6 text-center shrink-0">
            <h1 class="text-3xl font-bold tracking-tight">Understanding Decision Trees</h1>
            <p class="text-blue-100 mt-2 text-sm sm:text-base">
                A step-by-step interactive guide to how machines make decisions and evaluate splits.
            </p>
        </header>

        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 h-2 shrink-0">
            <div id="progress-bar" class="bg-blue-500 h-2 transition-all duration-300 w-0"></div>
        </div>

        <!-- Content Area -->
        <main class="flex-grow p-6 sm:p-10 flex flex-col items-center justify-start overflow-y-auto">
            <div id="step-content" class="w-full max-w-4xl transition-all duration-300">
                <!-- JavaScript will inject content here -->
            </div>
        </main>

        <!-- Footer / Navigation -->
        <footer class="bg-gray-50 p-6 border-t border-gray-200 flex justify-between items-center shrink-0">
            <button id="btn-prev"
                class="px-6 py-2.5 rounded-lg font-medium text-gray-600 bg-white border border-gray-300 hover:bg-gray-100 hover:text-gray-900 transition-colors disabled:opacity-40 disabled:cursor-not-allowed shadow-sm">
                &larr; Back
            </button>

            <div id="step-indicator" class="text-sm font-semibold text-gray-500 tracking-wide">
                Step 1 of X
            </div>

            <button id="btn-next"
                class="px-6 py-2.5 rounded-lg font-medium text-white bg-blue-600 hover:bg-blue-700 shadow-sm transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                Next Step &rarr;
            </button>
        </footer>
    </div>

    <script src="../js/decision_tree.js"></script>
</body>

</html>
