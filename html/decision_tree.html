<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Tree Visualization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transitions for the step content */
        .fade-enter {
            opacity: 0;
            transform: translateY(10px);
        }

        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }

        /* Math typography styling */
        .math-text {
            font-family: 'Times New Roman', Times, serif;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 font-sans text-gray-800">

    <!-- Main Container -->
    <div
        class="bg-white max-w-4xl w-full rounded-2xl shadow-xl border border-gray-100 overflow-hidden flex flex-col h-[800px]">

        <!-- Header -->
        <header class="bg-blue-600 text-white p-6 text-center">
            <h1 class="text-3xl font-bold tracking-tight">Understanding Decision Trees</h1>
            <p class="text-blue-100 mt-2 text-sm sm:text-base">A step-by-step interactive guide to how machines make
                decisions.</p>
        </header>

        <!-- Progress Bar -->
        <div class="w-full bg-gray-100 h-2">
            <div id="progress-bar" class="bg-blue-500 h-2 transition-all duration-300 w-0"></div>
        </div>

        <!-- Content Area -->
        <main class="flex-grow p-6 sm:p-10 flex flex-col items-center justify-center overflow-y-auto">
            <div id="step-content" class="w-full max-w-2xl w-full transition-all duration-300">
                <!-- JavaScript will inject content here -->
            </div>
        </main>

        <!-- Footer / Navigation -->
        <footer class="bg-gray-50 p-6 border-t border-gray-200 flex justify-between items-center">
            <button id="btn-prev"
                class="px-6 py-2.5 rounded-lg font-medium text-gray-600 bg-white border border-gray-300 hover:bg-gray-100 hover:text-gray-900 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                &larr; Back
            </button>

            <div id="step-indicator" class="text-sm font-semibold text-gray-500 tracking-wide">
                Step 1 of 4
            </div>

            <button id="btn-next"
                class="px-6 py-2.5 rounded-lg font-medium text-white bg-blue-600 hover:bg-blue-700 shadow-sm transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                Next Step &rarr;
            </button>
        </footer>
    </div>

    <script src="../js/decision_tree.js"></script>
</body>

</html>
