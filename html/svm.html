<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Vector Machine (SVM) Explained</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ensuring smooth transitions for UI elements */
        .step-transition {
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-6xl overflow-hidden flex flex-col md:flex-row">

        <!-- Left Side: Visualization Canvas -->
        <div
            class="w-full md:w-3/5 bg-white p-6 border-b md:border-b-0 md:border-r border-gray-100 flex flex-col items-center justify-center">
            <h2 class="text-2xl font-bold text-slate-800 mb-4 w-full text-center md:text-left">SVM Visualization</h2>

            <!-- Canvas Container -->
            <div class="relative w-full aspect-[3/2] bg-slate-50 border border-slate-200 rounded-lg overflow-hidden">
                <canvas id="svmCanvas" width="600" height="400" class="w-full h-full object-contain block"></canvas>
            </div>

            <!-- Visual Legend -->
            <div class="flex gap-4 mt-4 text-sm text-slate-600">
                <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-blue-500 inline-block"></span>
                    Class A</div>
                <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-red-500 inline-block"></span>
                    Class B</div>
                <div class="flex items-center gap-1 ml-4" id="legendOutlier" style="display:none;">
                    <span
                        class="w-3 h-3 rounded-full bg-red-500 opacity-50 inline-block border-2 border-red-700 border-dashed"></span>
                    Misclassified Point
                </div>
            </div>
        </div>

        <!-- Right Side: Explanations and Controls -->
        <div class="w-full md:w-2/5 p-6 md:p-8 flex flex-col justify-between bg-white">

            <div>
                <!-- Step Indicator -->
                <div class="text-xs font-bold tracking-wider text-indigo-500 uppercase mb-2" id="stepIndicator">
                    Step 1 of 8
                </div>

                <!-- Title -->
                <h3 class="text-xl font-bold text-slate-800 mb-3" id="stepTitle">
                    The Data
                </h3>

                <!-- Description -->
                <div class="text-slate-600 leading-relaxed min-h-[220px]" id="stepDescription">
                    <!-- Content injected via JS -->
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="flex items-center justify-between mt-8 pt-6 border-t border-gray-100">
                <button id="btnPrev"
                    class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    &larr; Back
                </button>

                <!-- Dot indicators -->
                <div class="flex gap-1.5 flex-wrap justify-center max-w-[150px]" id="dotIndicators">
                    <!-- Dots injected via JS -->
                </div>

                <button id="btnNext"
                    class="px-4 py-2 rounded-lg text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                    Next &rarr;
                </button>
            </div>

        </div>
    </div>

    <script src="../js/svm.js"></script>
</body>

</html>
