<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Understanding Naive Bayes</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        .fade-transition {
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
        }

        .fade-out {
            opacity: 0;
            transform: translateY(10px);
        }

        .fade-in {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <!-- Main Container -->
    <div
        class="bg-white rounded-2xl shadow-xl border border-gray-100 w-full max-w-5xl overflow-hidden flex flex-col min-h-[600px] h-[85vh] md:h-auto">

        <!-- Header -->
        <div class="bg-white border-b border-gray-100 p-6 flex items-center justify-between z-10 shrink-0">
            <div class="flex items-center gap-3">
                <div class="bg-blue-100 text-blue-600 p-2 rounded-lg">
                    <i class="fa-solid fa-brain text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Naive Bayes Classifier</h1>
            </div>
            <div id="step-counter" class="text-sm font-semibold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">
                Step 1 of 8
            </div>
        </div>

        <!-- Content Area -->
        <div class="flex-grow p-4 md:p-8 relative overflow-y-auto bg-slate-50/30">
            <div id="content-container" class="fade-transition fade-in h-full flex flex-col justify-center">
                <!-- Content will be injected here by JS -->
            </div>
        </div>

        <!-- Footer / Navigation -->
        <div class="bg-gray-50 border-t border-gray-200 p-6 flex items-center justify-between shrink-0">
            <button id="btn-prev"
                class="px-4 md:px-6 py-2.5 rounded-lg font-medium text-slate-600 bg-white border border-gray-300 hover:bg-gray-50 hover:text-slate-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> <span class="hidden md:inline">Back</span>
            </button>

            <!-- Progress Dots -->
            <div id="progress-dots" class="flex gap-2 flex-wrap justify-center max-w-[50%]">
                <!-- Dots injected by JS -->
            </div>

            <button id="btn-next"
                class="px-4 md:px-6 py-2.5 rounded-lg font-medium text-white bg-blue-600 hover:bg-blue-700 shadow-sm shadow-blue-200 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                <span class="hidden md:inline">Next</span> <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <script src="../js/naive_bayes.js"></script>
</body>

</html>
