<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistic Regression Interactive Guide</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- MathJax for LaTeX rendering -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            startup: {
                pageReady: () => {
                    return MathJax.startup.defaultPageReady().then(() => {
                        window.mathJaxReady = true;
                        initApp(); // Start app only after MathJax is ready
                    });
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        canvas {
            touch-action: none;
            /* Prevent scrolling when interacting with canvas */
        }

        /* Custom scrollbar for math container if it overflows */
        .math-scrollbar::-webkit-scrollbar {
            height: 6px;
        }

        .math-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        /* Smooth fade-in for math to prevent unstyled flash */
        .math-content {
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }

        .math-ready .math-content {
            opacity: 1;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-6xl overflow-hidden flex flex-col h-[85vh] max-h-[800px]">

        <!-- Header / Progress -->
        <div class="bg-blue-600 text-white p-6">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-2xl font-bold">Logistic Regression step-by-step</h1>
                <span id="step-counter"
                    class="text-blue-200 font-semibold text-sm bg-blue-800 px-3 py-1 rounded-full">Step 1 of X</span>
            </div>
            <div class="w-full bg-blue-400 rounded-full h-1.5 mt-4">
                <div id="progress-bar" class="bg-white h-1.5 rounded-full transition-all duration-300"
                    style="width: 0%"></div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="flex-grow flex flex-col md:flex-row overflow-y-auto">

            <!-- Text & Math Panel -->
            <div
                class="w-full md:w-1/2 p-6 md:p-8 flex flex-col border-b md:border-b-0 md:border-r border-slate-100 overflow-y-auto">
                <h2 id="step-title" class="text-xl font-bold text-slate-800 mb-4">Title</h2>

                <div id="step-description" class="math-content text-slate-600 space-y-4 text-base leading-relaxed mb-6">
                    <!-- Text injected by JS -->
                </div>

                <div id="step-math"
                    class="math-content math-scrollbar bg-slate-50 p-4 rounded-xl border border-slate-200 text-center my-auto overflow-x-auto min-h-[120px] flex flex-col justify-center items-center">
                    <!-- LaTeX injected by JS -->
                </div>
            </div>

            <!-- Visualization Panel -->
            <div class="w-full md:w-1/2 bg-slate-50 p-4 md:p-6 flex flex-col min-h-[300px]">

                <!-- Canvas Wrapper to allow dynamic resizing -->
                <div class="w-full flex-grow relative min-h-[250px]">
                    <canvas id="vizCanvas"
                        class="absolute top-0 left-0 w-full h-full bg-white rounded-lg shadow-sm border border-slate-200"></canvas>
                </div>

                <!-- Interactive Controls (Hidden by default) -->
                <div id="interactive-controls"
                    class="hidden w-full mt-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex-shrink-0">
                    <div class="mb-3">
                        <label class="flex justify-between text-sm font-medium text-slate-700 mb-1">
                            <span>Weight ($w$): Steepness</span>
                            <span id="val-w" class="text-blue-600 font-mono">1.5</span>
                        </label>
                        <input type="range" id="slider-w" min="-5" max="10" step="0.1" value="1.5"
                            class="w-full accent-blue-600">
                    </div>
                    <div>
                        <label class="flex justify-between text-sm font-medium text-slate-700 mb-1">
                            <span>Bias ($b$): Shift</span>
                            <span id="val-b" class="text-blue-600 font-mono">-6</span>
                        </label>
                        <input type="range" id="slider-b" min="-20" max="10" step="0.5" value="-6"
                            class="w-full accent-blue-600">
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer / Navigation -->
        <div class="p-4 md:p-6 bg-white border-t border-slate-100 flex justify-between items-center">
            <button id="btn-back"
                class="px-6 py-2.5 rounded-lg font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                &larr; Back
            </button>
            <button id="btn-next"
                class="px-6 py-2.5 rounded-lg font-medium text-white bg-blue-600 hover:bg-blue-700 shadow-md transition-all hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
                Next Step &rarr;
            </button>
        </div>

    </div>

    <script src="../js/logistics_regression.js"></script>
</body>

</html>
